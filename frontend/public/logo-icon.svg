  </defs>
  <g transform="translate(0, 30)">
    <path d="M 250,290 L 380,220 L 250,150 L 120,220 Z" fill="url(#layer-bot)" opacity="0.6" filter="url(#glow)"/>
    <path d="M 250,250 L 380,180 L 250,110 L 120,180 Z" fill="url(#layer-mid)" opacity="0.8" filter="url(#glow)"/>
    <path d="M 250,210 L 380,140 L 250,70 L 120,140 Z" fill="url(#layer-top)" filter="url(#glow)"/>
    <path d="M 250,210 L 380,140 L 250,70 L 120,140 Z" fill="none" stroke="#7E22CE" stroke-width="2" opacity="0.4"/>
    <path d="M 250,110 Q 250,140 220,140 Q 250,140 250,170 Q 250,140 280,140 Q 250,140 250,110 Z" fill="#FFFFFF"/>
  </g>
</svg>
